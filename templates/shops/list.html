{% extends "base.html" %} {% block content %}
<h1 class="mb-4">Browse Drinks</h1>

<div class="row">
  <div class="col-lg-3 col-md-4 mb-4">
    <div class="card shadow-sm border-0">
      <div class="card-body border-0">
        <h5 class="card-title fw-bold mb-3">Filters</h5>
        <form method="get" id="drink-filter-form">
          <div class="mb-3">
            <label class="form-label text-muted small">Search</label>
            <input
              type="text"
              name="q"
              id="q"
              class="form-control"
              value="{{ query|default:'' }}"
              placeholder="Drink or Shop"
            />
          </div>
          <div class="mb-3">
            <label class="form-label text-muted small">Shop</label>
            <select name="shop" id="shop" class="form-select">
              <option value="">All shops</option>
              {% for shop in shops %}
              <option
                value="{{ shop.slug }}"
                {%
                if
                selected_shop=""
                ="shop.slug"
                %}selected{%
                endif
                %}
              >
                {{ shop.name }}
              </option>
              {% endfor %}
            </select>
          </div>
          <div class="mb-3">
            <label class="form-label text-muted small">Drink Type</label>
            <select name="drink_type" id="drink_type" class="form-select">
              <option value="">All types</option>
              {% for value, label in drinks.model.DRINK_TYPES %}
              <option
                value="{{ value }}"
                {%
                if
                selected_drink_type=""
                ="value"
                %}selected{%
                endif
                %}
              >
                {{ label }}
              </option>
              {% endfor %}
            </select>
          </div>
          <div class="mb-3">
            <label class="form-label text-muted small">Minimum Rating</label>
            <select name="rating" id="rating" class="form-select">
              <option value="">Any rating</option>
              <option
                value="4"
                {%
                if
                selected_rating=""
                ="4"
                %}selected{%
                endif
                %}
              >
                4+ Stars
              </option>
              <option
                value="3"
                {%
                if
                selected_rating=""
                ="3"
                %}selected{%
                endif
                %}
              >
                3+ Stars
              </option>
              <option
                value="2"
                {%
                if
                selected_rating=""
                ="2"
                %}selected{%
                endif
                %}
              >
                2+ Stars
              </option>
            </select>
          </div>
          <div class="mb-3">
            <label class="form-label text-muted small">Sort By</label>
            <select name="sort" id="sort" class="form-select">
              <option
                value="name"
                {%
                if
                selected_sort=""
                ="name"
                %}selected{%
                endif
                %}
              >
                Name (A-Z)
              </option>
              <option
                value="top_rated"
                {%
                if
                selected_sort=""
                ="top_rated"
                %}selected{%
                endif
                %}
              >
                Top Rated
              </option>
              <option
                value="price_low"
                {%
                if
                selected_sort=""
                ="price_low"
                %}selected{%
                endif
                %}
              >
                Price: Low to High
              </option>
              <option
                value="price_high"
                {%
                if
                selected_sort=""
                ="price_high"
                %}selected{%
                endif
                %}
              >
                Price: High to Low
              </option>
            </select>
          </div>
          <button type="submit" class="btn btn-coffee w-100 mb-2">
            Apply Filters
          </button>
          <a
            href="{% url 'drinks:list' %}"
            id="clear-filters-link"
            class="btn btn-outline-secondary w-100"
            >Clear</a
          >
        </form>
      </div>
    </div>
  </div>

  <div class="col-lg-9 col-md-8">
    <div id="drink-results">{% include "drinks/_drink_results.html" %}</div>
  </div>
</div>

<script>
  document.addEventListener("DOMContentLoaded", function () {
    const form = document.getElementById("drink-filter-form");
    const results = document.getElementById("drink-results");
    const searchInput = document.getElementById("q");
    const clearLink = document.getElementById("clear-filters-link");
    let debounceTimer;

    function loadResults() {
      const params = new URLSearchParams(new FormData(form));
      const url = `${form.action || window.location.pathname}?${params.toString()}`;
      fetch(url, { headers: { "X-Requested-With": "XMLHttpRequest" } })
        .then((response) => response.text())
        .then((html) => {
          results.innerHTML = html;
          window.history.replaceState({}, "", url);
        })
        .catch((error) => console.error("Error loading drinks:", error));
    }
    form.addEventListener("change", (e) => {
      if (e.target.tagName === "SELECT") loadResults();
    });
    searchInput.addEventListener("input", () => {
      clearTimeout(debounceTimer);
      debounceTimer = setTimeout(loadResults, 300);
    });
    form.addEventListener("submit", (e) => {
      e.preventDefault();
      loadResults();
    });
    clearLink.addEventListener("click", (e) => {
      e.preventDefault();
      form.reset();
      loadResults();
    });
  });
</script>
{% endblock %}
